workflows:
  # ============================================================
  # Signing assumptions (do these ONCE in Codemagic web UI before
  # running any iOS workflow — don't do them in scripts):
  #
  #   1. Codemagic → Teams → Code signing identities → iOS
  #      certificates → "Generate certificate" → type iOS
  #      Distribution, pick App Store Connect integration. Lets
  #      Codemagic hold the private key in its vault.
  #   2. Apple Developer Portal → Profiles → + → App Store →
  #      bundle online.karti.hrm → select the cert from step 1
  #      → Generate.
  #   3. Codemagic → Teams → Code signing identities → iOS
  #      provisioning profiles → "Fetch profiles". Confirm the
  #      profile shows a green "Certificate: uploaded" badge.
  #
  # DO NOT add scripts that run `app-store-connect fetch-signing-files
  # --create` or `app-store-connect certificates create` — they fail
  # because Apple doesn't return the private key, and they burn
  # Apple's 3-cert-per-team retry quota.
  # ============================================================

  # ============================================================
  # STORE RELEASES — every build made via `shorebird release`
  # so the resulting artifact is patchable via Shorebird OTA later.
  # Remember: bump pubspec.yaml version (+N) between releases,
  # Shorebird rejects duplicate version numbers.
  # ============================================================

  android-workflow:
    name: Android Release (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      android_signing:
        - keystore.jks
      groups:
        - google_credentials       # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - shorebird_credentials    # SHOREBIRD_TOKEN
      vars:
        PACKAGE_NAME: "online.karti.hrm"
        GOOGLE_PLAY_TRACK: "internal"
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install Shorebird CLI
        script: |
          curl -sSf https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> $CM_ENV
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze
        ignore_failure: true
      - name: Shorebird release (AAB)
        script: |
          BUILD_NUMBER=$(($(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks="$GOOGLE_PLAY_TRACK" 2>/dev/null || echo 0) + 1))
          shorebird release android \
            --release-version=1.3.1+$BUILD_NUMBER \
            --no-confirm \
            -- \
            --build-name=1.3.1 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: true

  ios-workflow:
    name: iOS Release (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: online.karti.hrm
      groups:
        - shorebird_credentials    # SHOREBIRD_TOKEN
      vars:
        BUNDLE_ID: "online.karti.hrm"
        APP_STORE_APP_ID: "6762530619"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Shorebird CLI
        script: |
          curl -sSf https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> $CM_ENV
      - name: Ruby 3.4 / CocoaPods 1.16 fix
        script: |
          gem install logger bigdecimal
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: CocoaPods install (clean)
        script: |
          cd ios && rm -f Podfile.lock && rm -rf Pods && pod install --repo-update
      - name: Apply provisioning profiles + generate export_options.plist
        script: |
          xcode-project use-profiles \
            --export-options-plist=/Users/builder/export_options.plist \
            --warn-only
      - name: Flutter analyze
        script: |
          flutter analyze
        ignore_failure: true
      - name: Shorebird release (IPA)
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0) + 1))
          shorebird release ios \
            --release-version=1.3.1+$BUILD_NUMBER \
            --no-confirm \
            --export-options-plist=/Users/builder/export_options.plist \
            -- \
            --build-name=1.3.1 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ============================================================
  # OTA PATCHES — Dart-only hot fixes, delivered over-the-air to
  # users already on the last `shorebird release` build. No store
  # review, no reinstall. Rule of thumb:
  #   - pubspec.yaml changed / new native plugin / new entitlement
  #     → Release workflow (full store resubmission)
  #   - Dart-only fix → Patch workflow (usually live in minutes)
  # ============================================================

  android-patch-workflow:
    name: Android OTA Patch (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        - keystore.jks
      groups:
        - shorebird_credentials
      vars:
        PACKAGE_NAME: "online.karti.hrm"
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install Shorebird CLI
        script: |
          curl -sSf https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> $CM_ENV
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Shorebird patch (Android)
        script: |
          shorebird patch android --no-confirm
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true

  ios-patch-workflow:
    name: iOS OTA Patch (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: online.karti.hrm
      groups:
        - shorebird_credentials
      vars:
        BUNDLE_ID: "online.karti.hrm"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Shorebird CLI
        script: |
          curl -sSf https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
          echo 'export PATH="$HOME/.shorebird/bin:$PATH"' >> $CM_ENV
      - name: Ruby 3.4 / CocoaPods 1.16 fix
        script: |
          gem install logger bigdecimal
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: CocoaPods install (clean)
        script: |
          cd ios && rm -f Podfile.lock && rm -rf Pods && pod install --repo-update
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles \
            --export-options-plist=/Users/builder/export_options.plist \
            --warn-only
      - name: Shorebird patch (iOS)
        script: |
          shorebird patch ios --no-confirm
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true
