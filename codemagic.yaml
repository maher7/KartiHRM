workflows:
  # ============================================================
  # STORE RELEASES — every build made via `shorebird release`
  # so the resulting artifact is patchable via Shorebird OTA later
  # ============================================================

  android-workflow:
    name: Android Release (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      android_signing:
        - keystore.jks
      groups:
        - google_credentials       # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - shorebird_credentials    # SHOREBIRD_TOKEN
      vars:
        PACKAGE_NAME: "online.karti.hrm"
        GOOGLE_PLAY_TRACK: "internal"
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install Shorebird CLI
        script: |
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          echo "export PATH=\"\$HOME/.shorebird/bin:\$PATH\"" >> $CM_BUILD_DIR/path_export
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Flutter analyze
        script: |
          flutter analyze
        ignore_failure: true
      - name: Flutter unit tests
        script: |
          flutter test
        ignore_failure: true
      - name: Shorebird release (AAB)
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          BUILD_NUMBER=$(($(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks="$GOOGLE_PLAY_TRACK" 2>/dev/null || echo 0) + 1))
          shorebird release android \
            --release-version=1.3.1+$BUILD_NUMBER \
            -- \
            --build-name=1.3.1 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: true

  ios-workflow:
    name: iOS Release (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - shorebird_credentials    # SHOREBIRD_TOKEN
      vars:
        BUNDLE_ID: "online.karti.hrm"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        APP_STORE_APP_ID: "6762530619"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Install Shorebird CLI
        script: |
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          echo "export PATH=\"\$HOME/.shorebird/bin:\$PATH\"" >> $CM_BUILD_DIR/path_export
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certs to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Flutter analyze
        script: |
          flutter analyze
        ignore_failure: true
      - name: Flutter unit tests
        script: |
          flutter test
        ignore_failure: true
      - name: Shorebird release (IPA)
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0) + 1))
          shorebird release ios \
            --release-version=1.3.1+$BUILD_NUMBER \
            -- \
            --build-name=1.3.1 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  # ============================================================
  # OTA PATCHES — Dart-only hot fixes, delivered over the air
  # to users already on the last `shorebird release` build.
  # Use these for bug fixes. Can't add native code or change pubspec.
  # ============================================================

  android-patch-workflow:
    name: Android OTA Patch (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      android_signing:
        - keystore.jks
      groups:
        - shorebird_credentials    # SHOREBIRD_TOKEN
      vars:
        PACKAGE_NAME: "online.karti.hrm"
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install Shorebird CLI
        script: |
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Shorebird patch (Android)
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird patch android
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true

  ios-patch-workflow:
    name: iOS OTA Patch (Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - shorebird_credentials    # SHOREBIRD_TOKEN
      vars:
        BUNDLE_ID: "online.karti.hrm"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Install Shorebird CLI
        script: |
          curl --proto '=https' --tlsv1.2 https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -sSf | bash
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files from App Store Connect
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certs to keychain
        script: |
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Shorebird patch (iOS)
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird patch ios
    publishing:
      email:
        recipients:
          - support@mahersoftware.com
        notify:
          success: true
          failure: true
